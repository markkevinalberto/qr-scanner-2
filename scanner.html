<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR CODE SCANNER</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1a73e8">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="QR Scanner">

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 4px; }
    #startBtn {
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #1a73e8;
      color: white;
      cursor: pointer;
    }
    #reader {
      width: 100%;
      max-width: 420px;
      margin: 12px auto;
      border-radius: 8px;
      overflow: hidden;
    }
    #status {
      max-width: 420px;
      margin: 12px auto;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      min-height: 20px;
    }
    .ok { background: #d4edda; color: #155724; }
    .duplicate { background: #fff3cd; color: #856404; }
    .error { background: #f8d7da; color: #721c24; }
    .idle { background: #e2e3e5; color: #383d41; }
    #log {
      max-width: 420px;
      margin: 12px auto;
      text-align: left;
      font-size: 14px;
      background: white;
      border-radius: 8px;
      padding: 8px 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    #log div { padding: 4px 0; border-bottom: 1px solid #eee; }
    #connBanner {
      max-width: 420px;
      margin: 0 auto 12px;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 8px;
    }
    #connBanner.online { background: #d4edda; color: #155724; }
    #connBanner.offline { background: #f8d7da; color: #721c24; }
    #syncBar {
      max-width: 420px;
      margin: 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      color: #555;
    }
    #syncBtn {
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #1a73e8;
      background: white;
      color: #1a73e8;
      cursor: pointer;
    }
    #syncBtn:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
  <h2>QR CODE SCANNER</h2>
  <p id="credentials" style="margin: 0 0 10px; font-size: 14px; color: #555;">Made by MarkKevinAlberto</p>
  <p>Point the camera at a QR code (format: Name,Section)</p>

  <div style="margin-bottom: 12px;">
    <a id="sheetLink" href="https://docs.google.com/spreadsheets/d/1-1QE8naREL5aevFw_KUtiLP7EVZ8xd3K64A70mtAB6I/edit?usp=sharing" target="_blank" rel="noopener"
       style="display:inline-block; padding:8px 16px; border-radius:8px; border:1px solid #1a73e8; color:#1a73e8; text-decoration:none; font-size:14px;">
      📊 View Data Scanned
    </a>
  </div>

  <div id="connBanner"></div>

  <button id="startBtn">Start Camera</button>

  <div id="reader"></div>
  <div id="status" class="idle">Tap "Start Camera" to begin.</div>

  <div id="syncBar">
    <span id="pendingCount">0 pending sync</span>
    <button id="syncBtn">⬆ Sync to Google Sheet</button>
  </div>

  <div id="log"></div>

  <script>
    // ⚠️ REQUIRED: paste your deployed Apps Script Web App URL here.
    // It must end in /exec — get it from Apps Script > Deploy > Manage deployments.
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4l832Hpg37aHxPvi_qWGUhTnqLb5qieGVWk-_YT32qfCrLbnISX87F2svy4X8QKlD/exec';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const connBanner = document.getElementById('connBanner');
    const pendingCountEl = document.getElementById('pendingCount');
    const syncBtn = document.getElementById('syncBtn');
    let isProcessing = false;
    let callbackCounter = 0;
    let isSyncing = false;

    // ---- Local-first storage: every scan is saved to localStorage right away,
    // then synced to the Google Sheet when a connection is available. ----
    const QUEUE_KEY = 'qrScanQueue';

    function loadQueue() {
      try {
        return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
    }

    function addToQueue(text) {
      const queue = loadQueue();
      const record = {
        id: Date.now() + '-' + Math.random().toString(36).slice(2),
        text: text,
        time: new Date().toISOString(),
        status: 'pending',
        message: null,
      };
      queue.push(record);
      saveQueue(queue);
      renderLogEntry(record);
      renderPendingCount();
      return record;
    }

    function updateRecord(id, patch) {
      const queue = loadQueue();
      const record = queue.find(function (r) { return r.id === id; });
      if (!record) return null;
      Object.assign(record, patch);
      saveQueue(queue);
      renderLogEntry(record);
      renderPendingCount();
      return record;
    }

    function renderLogEntry(record) {
      let el = logEl.querySelector('[data-id="' + record.id + '"]');
      if (!el) {
        el = document.createElement('div');
        el.dataset.id = record.id;
        logEl.prepend(el);
      }
      const time = new Date(record.time).toLocaleTimeString();
      if (record.status === 'synced') {
        el.textContent = '✔ ' + (record.message || record.text) + ' — ' + time;
      } else if (record.status === 'duplicate') {
        el.textContent = '⏳ ' + (record.message || 'Duplicate') + ' — ' + time;
      } else if (record.status === 'error') {
        el.textContent = '⚠ ' + record.text + ' — sync failed, will retry — ' + time;
      } else {
        el.textContent = '💾 ' + record.text + ' — saved locally, will sync — ' + time;
      }
    }

    function renderPendingCount() {
      const pending = loadQueue().filter(function (r) { return r.status === 'pending' || r.status === 'error'; });
      pendingCountEl.textContent = pending.length + ' pending sync';
      syncBtn.disabled = isSyncing || pending.length === 0 || !navigator.onLine;
    }

    function renderConnBanner() {
      if (navigator.onLine) {
        connBanner.textContent = '🟢 Online';
        connBanner.className = 'online';
      } else {
        connBanner.textContent = '🔴 Offline — scans are saved locally and will sync later';
        connBanner.className = 'offline';
      }
      renderPendingCount();
    }

    // ---- Sound feedback (Web Audio API — no sound file needed) ----
    let audioCtx = null;

    function playTone(freq, duration) {
      try {
        if (!audioCtx) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.value = freq;
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
      } catch (e) {
        // Web Audio not available — fail silently, sound is a nice-to-have
      }
    }

    function playSuccessBeep() {
      playTone(880, 0.15); // single high beep
    }
    function playDuplicateBeep() {
      playTone(440, 0.12);
      setTimeout(() => playTone(440, 0.12), 180); // two short low beeps
    }
    function playErrorBeep() {
      playTone(220, 0.25); // one low buzz
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    // Sends one queued record to the Apps Script backend using JSONP —
    // this avoids CORS issues entirely since it doesn't use fetch(). Resolves
    // with the server's result, or rejects if the request never came back
    // (offline, unreachable, etc.) so the caller can leave it queued.
    function sendToSheet(text) {
      return new Promise(function (resolve, reject) {
        const callbackName = 'qrCallback_' + (callbackCounter++);

        const timeoutId = setTimeout(function () {
          if (window[callbackName]) {
            delete window[callbackName];
            reject(new Error('timeout'));
          }
        }, 8000);

        window[callbackName] = function (result) {
          clearTimeout(timeoutId);
          delete window[callbackName];
          resolve(result);
        };

        const script = document.createElement('script');
        script.src = APPS_SCRIPT_URL + '?data=' + encodeURIComponent(text) + '&callback=' + callbackName;
        script.onerror = function () {
          clearTimeout(timeoutId);
          delete window[callbackName];
          reject(new Error('network error'));
        };
        document.body.appendChild(script);
        setTimeout(() => script.remove(), 9000);
      });
    }

    // Attempts to sync one queued record; leaves it as 'pending' on failure
    // so it gets picked up again by the next manual or automatic sync.
    function trySyncRecord(record, opts) {
      opts = opts || {};
      return sendToSheet(record.text).then(function (result) {
        if (result.status === 'ok') {
          updateRecord(record.id, { status: 'synced', message: result.message });
          if (opts.feedback) { setStatus(result.message, 'ok'); playSuccessBeep(); }
        } else if (result.status === 'duplicate') {
          updateRecord(record.id, { status: 'duplicate', message: result.message });
          if (opts.feedback) { setStatus(result.message, 'duplicate'); playDuplicateBeep(); }
        } else {
          updateRecord(record.id, { status: 'error' });
          if (opts.feedback) { setStatus(result.message, 'error'); playErrorBeep(); }
        }
      }).catch(function () {
        updateRecord(record.id, { status: 'pending' });
        if (opts.feedback) { setStatus('Saved offline — will sync when back online.', 'idle'); }
      });
    }

    // Syncs every queued record that isn't synced yet, one at a time.
    function syncPending() {
      if (isSyncing) return Promise.resolve();
      const toSync = loadQueue().filter(function (r) { return r.status === 'pending' || r.status === 'error'; });
      if (toSync.length === 0) return Promise.resolve();

      isSyncing = true;
      renderPendingCount();
      syncBtn.textContent = 'Syncing...';

      return toSync.reduce(function (chain, record) {
        return chain.then(function () { return trySyncRecord(record); });
      }, Promise.resolve()).then(function () {
        isSyncing = false;
        syncBtn.textContent = '⬆ Sync to Google Sheet';
        renderPendingCount();
      });
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return; // avoid duplicate rapid-fire scans of the same frame
      isProcessing = true;

      const record = addToQueue(decodedText);
      setStatus('Saved: ' + decodedText, 'idle');

      if (navigator.onLine) {
        trySyncRecord(record, { feedback: true }).then(function () {
          setTimeout(() => { isProcessing = false; }, 1500);
        });
      } else {
        setStatus('Saved locally (offline) — will sync later.', 'idle');
        setTimeout(() => { isProcessing = false; }, 1500);
      }
    }

    syncBtn.addEventListener('click', function () {
      syncPending();
    });

    window.addEventListener('online', function () {
      renderConnBanner();
      syncPending();
    });
    window.addEventListener('offline', renderConnBanner);

    renderConnBanner();
    loadQueue().forEach(renderLogEntry);
    if (navigator.onLine) syncPending();
  </script>

  <script>
    // Kept separate from the sync/queue logic above so a hiccup loading the
    // html5-qrcode CDN script can't also break offline saving and syncing.
    const scanner = new Html5Qrcode('reader');
    const startBtnEl = document.getElementById('startBtn');

    startBtnEl.addEventListener('click', function () {
      if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
        setStatus('Edit this file first: paste your Apps Script URL in APPS_SCRIPT_URL.', 'error');
        return;
      }

      // Unlock audio playback on iOS — must happen inside a user gesture
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      startBtnEl.disabled = true;
      startBtnEl.textContent = 'Starting...';

      scanner.start(
        { facingMode: 'environment' }, // use rear camera
        { fps: 10, qrbox: 250 },
        onScanSuccess
      ).then(function () {
        startBtnEl.style.display = 'none';
        setStatus('Camera active — point at a QR code', 'idle');
      }).catch(function (err) {
        startBtnEl.disabled = false;
        startBtnEl.textContent = 'Start Camera';
        setStatus('Camera error: ' + err, 'error');
      });
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function (err) {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
